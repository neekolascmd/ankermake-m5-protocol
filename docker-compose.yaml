services:
    ankerctl:
        image: anselor/ankerctl:exile-latest
        container_name: ankerctl
        restart: unless-stopped
        build: .

        # explicit port mapping is used instead of host networking to 
        # allow macOS and Windows Docker Desktop compatibility.
        ports:
            - "${FLASK_PORT:-4470}:${FLASK_PORT:-4470}/tcp"
            - "32108:32108/udp" # PPPP_LAN_PORT for camera/LAN traffic
            - "32100:32100/udp" # PPPP_WAN_PORT fallback

        # bind to 0.0.0.0 so the container can receive traffic
        environment:
            - FLASK_HOST=0.0.0.0
            - FLASK_PORT=${FLASK_PORT:-4470}
        volumes:
            - ${ANKERCTL_DATA:-ankerctl_vol}:/root/.config/ankerctl

volumes:
    ankerctl_vol:
